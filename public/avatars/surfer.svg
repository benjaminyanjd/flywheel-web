  <path d="M0 150 Q30 138 60 148 Q90 158 120 142 Q150 126 180 142 Q195 150 200 145 L200 200 L0 200Z" fill="#3CB371" opacity="0.25"/>
  <path d="M0 162 Q35 152 65 160 Q95 168 125 155 Q155 142 185 155 Q195 160 200 157 L200 200 L0 200Z" fill="#3CB371" opacity="0.4"/>
