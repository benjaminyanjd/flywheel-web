name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}

      - run: npm test -- --run
        if: always()

  notify:
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Notify result
        run: |
          STATUS="${{ needs.ci.result == 'success' && '✅ CI 通過' || '❌ CI 失敗' }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=5825881638&text=${STATUS}%3A+${{ github.event.head_commit.message }}" \
            -o /dev/null || true
